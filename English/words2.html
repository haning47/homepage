<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字學習卡SRS版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f1f5f9; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .btn-again { background-color: #ef4444; } .btn-hard { background-color: #f59e0b; }
        .btn-good { background-color: #3b82f6; } .btn-easy { background-color: #10b981; }
        
        .word-detail-row .speaker-icon-btn { opacity: 0; transition: all 0.2s ease; color: #94a3b8; padding: 4px; border-radius: 6px; }
        .word-detail-row:hover .speaker-icon-btn { opacity: 1; }
        .speaker-icon-btn:hover { color: #4f46e5 !important; background-color: #e0e7ff; transform: scale(1.05); }
        .selected-row { background-color: #f1f5f9 !important; box-shadow: inset 4px 0 0 #4f46e5; }

        .modal-enter { transform: scale(0.95); opacity: 0; }
        .modal-active { transform: scale(1); opacity: 1; transition: all 0.2s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <div id="import-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
            <div class="w-full max-w-md bg-white rounded-[40px] shadow-2xl p-10 border border-slate-100 flex flex-col items-center text-center">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-8">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-800 mb-2">匯入單字庫</h1>
                <p class="text-slate-400 font-medium mb-10">SRS 模式</p>
                <label class="w-full cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl text-center shadow-lg transition-all mb-4 block text-lg">
                    選擇 CSV 檔案
                    <input type="file" id="file-input" accept=".csv" class="hidden">
                </label>
            </div>
        </div>

        <div id="study-screen" class="hidden min-h-screen flex flex-col items-center p-4">
            <div class="w-full max-w-2xl mb-4 flex items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-1 border-r border-slate-100 pr-2">
                    <button id="reset-btn" title="更換字庫" class="p-1 text-slate-400 hover:text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </button>
                    <button id="info-btn" title="使用說明" class="p-1 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    </button>
                    
                    <div class="flex items-center gap-1 ml-0.5 pl-2 border-l border-slate-100">
                        <div class="flex flex-col items-center min-w-[24px]">
                            <span id="speed-display" class="text-[10px] font-black text-slate-600 leading-none">10</span>
                            <span class="text-[7px] text-slate-400 font-bold uppercase">SPD</span>
                        </div>
                        <div class="flex flex-col -gap-1">
                            <button id="speed-up" class="p-0 text-slate-400 hover:text-blue-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="18 15 12 9 6 15"/></svg>
                            </button>
                            <button id="speed-down" class="p-0 text-slate-400 hover:text-blue-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 ml-1">
                    <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-1">
                        <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between items-center text-[10px] font-bold uppercase">
                        <div class="text-slate-400"><span id="progress-text">0 / 0</span> <span id="progress-percent" class="ml-1 text-blue-600">0%</span></div>
                        <div class="flex gap-2">
                            <span class="text-red-500">Again: <span id="count-again">0</span></span>
                            <span class="text-amber-500">Hard: <span id="count-hard">0</span></span>
                            <span class="text-blue-500">Good: <span id="count-good">0</span></span>
                            <span class="text-emerald-500">Easy: <span id="count-easy">0</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="relative w-full max-w-xl h-[480px] perspective-1000">
                <div id="card-inner" class="card-inner relative w-full h-full transform-style-3d cursor-pointer">
                    <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center border border-slate-200">
                        <h2 id="word-display" class="text-6xl font-extrabold text-slate-800 tracking-tight text-center px-4">Word</h2>
                    </div>
                    <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-3xl shadow-xl flex flex-col border border-slate-200 rotate-y-180 overflow-hidden">
                        <div class="w-full h-28 bg-slate-50 relative border-b border-slate-100">
                             <img id="card-image" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-300">
                             <div id="image-loader" class="absolute inset-0 flex items-center justify-center text-slate-200 animate-spin text-2xl">🌀</div>
                        </div>
                        <div class="flex justify-between items-center px-6 py-2 bg-white border-b border-slate-50">
                            <h3 id="back-word-title" class="text-lg font-bold text-slate-800 tracking-tight">Word</h3>
                            <button id="speak-word" class="p-1.5 text-blue-600 hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
                        </div>
                        <div id="details-container" class="flex-1 overflow-y-auto px-6 py-2 custom-scrollbar text-sm leading-normal"></div>
                    </div>
                </div>
            </div>

            <div id="srs-controls" class="invisible w-full max-w-xl grid grid-cols-4 gap-3 mt-6">
                <button onclick="handleSRS('again')" class="btn-again text-white py-4 rounded-2xl shadow-lg font-bold">Again</button>
                <button onclick="handleSRS('hard')" class="btn-hard text-white py-4 rounded-2xl shadow-lg font-bold">Hard</button>
                <button onclick="handleSRS('good')" class="btn-good text-white py-4 rounded-2xl shadow-lg font-bold">Good</button>
                <button onclick="handleSRS('easy')" class="btn-easy text-white py-4 rounded-2xl shadow-lg font-bold">Easy</button>
            </div>
        </div>

        <div id="summary-screen" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-50/80 backdrop-blur-md">
            <div id="summary-content" class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl flex flex-col items-center text-center modal-enter">
                <div class="text-6xl mb-6">🎉</div>
                <h2 class="text-3xl font-extrabold text-slate-800 mb-8">全部完成！</h2>
                <div class="grid grid-cols-2 gap-4 w-full mb-10">
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                        <div id="summary-again" class="text-2xl font-black text-red-600">0</div>
                        <div class="text-[10px] font-bold text-red-400 uppercase tracking-wider">Again</div>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                        <div id="summary-hard" class="text-2xl font-black text-amber-600">0</div>
                        <div class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">Hard</div>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <div id="summary-good" class="text-2xl font-black text-blue-600">0</div>
                        <div class="text-[10px] font-bold text-blue-400 uppercase tracking-wider">Good</div>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                        <div id="summary-easy" class="text-2xl font-black text-emerald-600">0</div>
                        <div class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">Easy</div>
                    </div>
                </div>
                <button id="back-to-home" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all text-lg">
                    回到首頁 (Enter)
                </button>
            </div>
        </div>

        <div id="info-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
            <div id="info-content" class="w-full max-w-md bg-white rounded-[40px] shadow-2xl overflow-hidden modal-enter">
                <div class="flex items-center justify-between px-8 pt-8 pb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">i</div>
                        <h2 class="text-2xl font-extrabold text-slate-800">使用說明</h2>
                    </div>
                    <button id="close-info" class="text-slate-400 hover:text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="px-8 pb-10">
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-6">快捷鍵功能</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">Space</kbd>
                            <span class="text-slate-600 font-semibold text-sm">翻面</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">↑↓</kbd>
                            <span class="text-slate-600 font-semibold text-sm">選擇句子</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">Enter</kbd>
                            <span class="text-slate-600 font-semibold text-sm">朗讀 / 確定</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">0</kbd>
                            <span class="text-slate-600 font-semibold text-sm">切換例句朗讀</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">1</kbd>
                            <span class="text-slate-600 font-semibold text-sm">Again 間隔2</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">2</kbd>
                            <span class="text-slate-600 font-semibold text-sm">Hard 放中間</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">3</kbd>
                            <span class="text-slate-600 font-semibold text-sm">Good 放最後</span>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <kbd class="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-bold shadow-sm min-w-[50px] text-center">4</kbd>
                            <span class="text-slate-600 font-semibold text-sm">Easy 移除</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="resume-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
            <div id="resume-content" class="w-full max-w-xs bg-white rounded-[40px] p-8 shadow-2xl flex flex-col items-center text-center modal-enter">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800 mb-2">恢復進度？</h2>
                <p class="text-slate-400 font-medium mb-8">偵測到上次未完成的學習紀錄，是否從上次中斷的地方繼續？</p>
                <button id="confirm-resume" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl mb-3 shadow-lg">恢復進度</button>
                <button id="cancel-resume" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl">重新開始</button>
            </div>
        </div>

        <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
            <div id="modal-content" class="w-full max-w-xs bg-white rounded-[40px] p-8 shadow-2xl flex flex-col items-center text-center modal-enter">
                <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800 mb-2">更換單字庫？</h2>
                <p class="text-slate-400 font-medium mb-8">目前的學習進度將會被刪除並回到匯入頁面。</p>
                <button id="confirm-reload" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl mb-3 shadow-lg">確認更換</button>
                <button id="cancel-reload" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl">取消</button>
            </div>
        </div>
    </div>

    <script>
        let queue = [], totalCount = 0, isFlipped = false;
        let currentDetailIndex = -1, currentSentenceToggleIndex = 0;
        let speechSpeed = 1.0, stats = { again: 0, hard: 0, good: 0, easy: 0 };
        const synth = window.speechSynthesis;

        function filterText(text) {
            if (!text) return "";
            let clean = text.replace(/\([a-z]+\.\)/gi, "");
            return clean.replace(/[^a-zA-Z\s]/g, "").trim();
        }

        function speak(text) {
            const englishOnly = filterText(text);
            if (!englishOnly || synth.speaking) synth.cancel();
            if (englishOnly) {
                const utter = new SpeechSynthesisUtterance(englishOnly);
                utter.lang = 'en-US'; utter.rate = speechSpeed; synth.speak(utter);
            }
        }

        function saveProgress() { localStorage.setItem('srs_progress', JSON.stringify({ queue, totalCount, stats })); }
        function clearProgress() { localStorage.removeItem('srs_progress'); }

        function toggleModal(modalId, contentId, show) {
            const m = document.getElementById(modalId);
            const c = document.getElementById(contentId);
            if (show) { m.classList.remove('hidden'); setTimeout(() => c.classList.add('modal-active'), 10); }
            else { c.classList.remove('modal-active'); setTimeout(() => m.classList.add('hidden'), 200); }
        }

        function parseCSV(text) {
            const rows = []; let field = '', inQuotes = false, fields = [];
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { fields.push(field); field = ''; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    fields.push(field); if (fields[0]) rows.push({ word: fields[0].trim(), details: fields.slice(1).join(',').trim() });
                    fields = []; field = ''; if (char === '\r' && text[i+1] === '\n') i++;
                } else field += char;
            }
            if (field || fields.length > 0) { fields.push(field); if (fields[0]) rows.push({ word: fields[0].trim(), details: fields.slice(1).join(',').trim() }); }
            return rows;
        }

        function getExampleSentences(details) {
            const lines = details.split('\n').map(l => l.trim()).filter(l => l);
            const examples = [];
            for (let i = 0; i < lines.length - 1; i++) {
                if (/[a-zA-Z]/.test(lines[i]) && (lines[i+1].startsWith('(') || lines[i+1].startsWith('（')) && !lines[i+1].includes('詞性變化')) examples.push(lines[i]);
            }
            return examples;
        }

        function startStudy() {
            document.getElementById('import-screen').classList.add('hidden');
            document.getElementById('study-screen').classList.remove('hidden');
            document.getElementById('summary-screen').classList.add('hidden');
            renderCard();
        }

        function renderCard() {
            if (queue.length === 0) { showSummary(); return; }
            isFlipped = false; currentDetailIndex = -1; currentSentenceToggleIndex = 0;
            const current = queue[0];
            document.getElementById('word-display').innerText = current.word;
            document.getElementById('back-word-title').innerText = current.word;
            document.getElementById('card-inner').classList.remove('rotate-y-180');
            document.getElementById('srs-controls').classList.add('invisible');

            const container = document.getElementById('details-container'); container.innerHTML = '';
            current.details.split('\n').filter(l => l.trim()).forEach((line, idx) => {
                const div = document.createElement('div');
                div.className = "word-detail-row flex justify-between items-center px-3 mb-1 leading-relaxed rounded-lg cursor-pointer hover:bg-slate-50 transition-all";
                const hasEnglish = /[a-zA-Z]/.test(line);
                const speakerDisplay = hasEnglish ? '' : 'style="display:none"';
                div.innerHTML = `<span>${line.trim()}</span><button class="speaker-icon-btn ml-2" ${speakerDisplay}><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>`;
                div.onclick = (e) => { e.stopPropagation(); selectDetail(idx); speak(line.trim()); };
                container.appendChild(div);
            });

            const img = document.getElementById('card-image'); const loader = document.getElementById('image-loader');
            img.classList.add('opacity-0'); loader.style.display = 'flex';
            img.src = `https://loremflickr.com/600/200/${encodeURIComponent(current.word)}`;
            img.onload = () => { img.classList.remove('opacity-0'); loader.style.display = 'none'; };

            const progress = ((totalCount - queue.length) / totalCount) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${queue.length} / ${totalCount}`;
            document.getElementById('progress-percent').innerText = `${Math.round(progress)}%`;
            ['again', 'hard', 'good', 'easy'].forEach(s => document.getElementById(`count-${s}`).innerText = stats[s]);
            speak(current.word); saveProgress();
        }

        function showSummary() {
            document.getElementById('study-screen').classList.add('hidden');
            const summaryScreen = document.getElementById('summary-screen');
            const summaryContent = document.getElementById('summary-content');
            document.getElementById('summary-again').innerText = stats.again;
            document.getElementById('summary-hard').innerText = stats.hard;
            document.getElementById('summary-good').innerText = stats.good;
            document.getElementById('summary-easy').innerText = stats.easy;
            summaryScreen.classList.remove('hidden');
            setTimeout(() => summaryContent.classList.add('modal-active'), 10);
            clearProgress();
        }

        function exitToHome() { location.reload(); }

        function selectDetail(index) {
            const rows = document.querySelectorAll('.word-detail-row');
            rows.forEach(r => r.classList.remove('selected-row'));
            if (rows[index]) { rows[index].classList.add('selected-row'); rows[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' }); currentDetailIndex = index; }
        }

        function handleSRS(type) {
            const current = queue.shift(); stats[type]++;
            if (type === 'again') queue.splice(2, 0, current);
            else if (type === 'hard') queue.splice(Math.floor(queue.length / 2), 0, current);
            else if (type === 'good') queue.push(current);
            renderCard();
        }

        // 事件綁定
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { queue = parseCSV(ev.target.result).sort(() => Math.random() - 0.5); totalCount = queue.length; startStudy(); };
            reader.readAsText(e.target.files[0]);
        };

        document.getElementById('card-inner').onclick = () => {
            if (isFlipped) return; isFlipped = true;
            document.getElementById('card-inner').classList.add('rotate-y-180');
            document.getElementById('srs-controls').classList.remove('invisible');
            const sents = getExampleSentences(queue[0].details);
            setTimeout(() => speak(sents.length > 0 ? sents[0] : queue[0].word), 400);
        };

        document.getElementById('speed-up').onclick = (e) => { e.stopPropagation(); speechSpeed = Math.min(1.0, speechSpeed + 0.1); document.getElementById('speed-display').innerText = Math.round(speechSpeed * 10); };
        document.getElementById('speed-down').onclick = (e) => { e.stopPropagation(); speechSpeed = Math.max(0.1, speechSpeed - 0.1); document.getElementById('speed-display').innerText = Math.round(speechSpeed * 10); };
        document.getElementById('speak-word').onclick = (e) => { e.stopPropagation(); speak(queue[0].word); };
        document.getElementById('info-btn').onclick = () => toggleModal('info-modal', 'info-content', true);
        document.getElementById('close-info').onclick = () => toggleModal('info-modal', 'info-content', false);
        document.getElementById('reset-btn').onclick = () => toggleModal('confirm-modal', 'modal-content', true);
        document.getElementById('cancel-reload').onclick = () => toggleModal('confirm-modal', 'modal-content', false);
        document.getElementById('confirm-reload').onclick = () => { clearProgress(); location.reload(); };
        document.getElementById('back-to-home').onclick = exitToHome;

        window.onkeydown = (e) => {
            if (!document.getElementById('summary-screen').classList.contains('hidden')) {
                if (e.key === 'Enter') exitToHome();
                return;
            }
            if (document.getElementById('study-screen').classList.contains('hidden')) return;
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (!isFlipped) document.getElementById('card-inner').click();
                else if (currentDetailIndex !== -1) speak(document.querySelectorAll('.word-detail-row')[currentDetailIndex].innerText);
            }
            if (isFlipped) {
                if (e.key === '0') {
                    e.preventDefault(); const sents = getExampleSentences(queue[0].details);
                    if (sents.length > 0) { speak(sents[currentSentenceToggleIndex % sents.length]); currentSentenceToggleIndex++; }
                }
                if (e.key === 'ArrowDown') { e.preventDefault(); selectDetail(currentDetailIndex + 1); }
                if (e.key === 'ArrowUp') { e.preventDefault(); selectDetail(currentDetailIndex - 1); }
                if (['1','2','3','4'].includes(e.key)) handleSRS({'1':'again', '2':'hard', '3':'good', '4':'easy'}[e.key]);
            }
        };

        window.onload = () => {
            const stored = localStorage.getItem('srs_progress');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.queue && data.queue.length > 0) {
                    toggleModal('resume-modal', 'resume-content', true);
                    document.getElementById('confirm-resume').onclick = () => { queue = data.queue; totalCount = data.totalCount; stats = data.stats; toggleModal('resume-modal', 'resume-content', false); startStudy(); };
                    document.getElementById('cancel-resume').onclick = () => { clearProgress(); toggleModal('resume-modal', 'resume-content', false); };
                }
            }
        };
    </script>
</body>
</html>
